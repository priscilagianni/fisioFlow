openapi: 3.0.3

info:
  title: FisioFlow API
  version: 1.0.0
  description: API REST para gerenciamento de pacientes e agendamentos de fisioterapia.

servers:
  - url: http://localhost:3000

tags:
  - name: Patients
  - name: Appointments

paths:

  /patients:

    post:
      tags: [Patients]
      summary: Criar paciente

      description: |
        ## Regras de negócio
        - name é obrigatório
        - deve conter letras e espaços
        - age é obrigatório e deve estar entre 1 e 120
        - phone e diagnosis são opcionais

      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatientInput'
            example:
              name: "Maria Silva"
              age: 30
              phone: "(81) 99999-0000"
              diagnosis: "Dor lombar"

      responses:
        '201':
          description: Paciente criado com sucesso
        '400':
          description: Erro de validação
        '500':
          description: Erro interno do servidor

    get:
      tags: [Patients]
      summary: Listar pacientes

      responses:
        '200':
          description: Lista de pacientes
        '500':
          description: Erro interno do servidor


  /patients/{id}:

    parameters:
      - $ref: '#/components/parameters/Id'

    get:
      tags: [Patients]
      summary: Buscar paciente por ID

      responses:
        '200':
          description: Paciente encontrado
        '404':
          description: Paciente não encontrado
        '500':
          description: Erro interno do servidor

    put:
      tags: [Patients]
      summary: Atualizar paciente

      description: |
        ## Regras de negócio
        - paciente deve existir
        - name deve conter letras e espaços
        - age deve estar entre 1 e 120

      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatientInput'
            example:
              name: "Maria Silva"
              age: 31
              phone: "(81) 98888-7777"
              diagnosis: "Dor lombar"

      responses:
        '200':
          description: Paciente atualizado com sucesso
        '400':
          description: Dados inválidos
        '404':
          description: Paciente não encontrado
        '500':
          description: Erro interno do servidor

    delete:
      tags: [Patients]
      summary: Excluir paciente

      description: |
        ## Regras de negócio
        - paciente deve existir
        - não pode ser excluído se tiver agendamentos (409)

      responses:
        '200':
          description: Paciente removido com sucesso
        '404':
          description: Paciente não encontrado
        '409':
          description: Paciente possui agendamentos
        '500':
          description: Erro interno do servidor


  /appointments:

    post:
      tags: [Appointments]
      summary: Criar agendamento

      description: |
        ## Regras de negócio
        - patientId deve existir
        - date obrigatória (YYYY-MM-DD) e não pode ser no passado
        - time obrigatório (HH:MM)
        - durationMinutes obrigatório e > 0
        - type obrigatório
        - não pode haver conflito de horário (409)

      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AppointmentInput'
            example:
              patientId: 1
              date: "2026-07-20"
              time: "10:00"
              durationMinutes: 50
              type: "Avaliação"
              notes: "Primeira consulta"

      responses:
        '201':
          description: Agendamento criado com sucesso
        '400':
          description: Dados inválidos
        '409':
          description: Conflito de horário
        '500':
          description: Erro interno do servidor

    get:
      tags: [Appointments]
      summary: Listar agendamentos

      responses:
        '200':
          description: Lista de agendamentos
        '500':
          description: Erro interno do servidor


  /appointments/{id}:

    parameters:
      - $ref: '#/components/parameters/Id'

    get:
      tags: [Appointments]
      summary: Buscar agendamento por ID

      responses:
        '200':
          description: Agendamento encontrado
        '404':
          description: Agendamento não encontrado
        '500':
          description: Erro interno do servidor

    put:
      tags: [Appointments]
      summary: Atualizar agendamento

      description: |
        ## Regras de negócio
        - agendamento deve existir
        - valida conflito de horário (409)
        - mantém campos não enviados

      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AppointmentInput'
            example:
              patientId: 1
              date: "2026-07-20"
              time: "10:00"
              durationMinutes: 50
              type: "Avaliação"
              notes: "Atualização"

      responses:
        '200':
          description: Agendamento atualizado com sucesso
        '400':
          description: Dados inválidos
        '404':
          description: Agendamento não encontrado
        '409':
          description: Conflito de horário
        '500':
          description: Erro interno do servidor

    delete:
      tags: [Appointments]
      summary: Excluir agendamento

      description: |
        ## Regras de negócio
        - agendamento deve existir

      responses:
        '200':
          description: Agendamento removido com sucesso
        '404':
          description: Agendamento não encontrado
        '500':
          description: Erro interno do servidor


  /appointments/day/{date}:

    get:
      tags: [Appointments]
      summary: Buscar agendamentos por dia

      parameters:
        - name: date
          in: path
          required: true
          schema:
            type: string
            format: date

      responses:
        '200':
          description: Lista de agendamentos do dia
        '500':
          description: Erro interno do servidor


components:

  parameters:
    Id:
      name: id
      in: path
      required: true
      schema:
        type: integer

  schemas:

    PatientInput:
      type: object
      properties:
        name:
          type: string
        age:
          type: integer
        phone:
          type: string
        diagnosis:
          type: string

    AppointmentInput:
      type: object
      properties:
        patientId:
          type: integer
        date:
          type: string
          format: date
        time:
          type: string
        durationMinutes:
          type: integer
        type:
          type: string
        notes:
          type: string

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error